services:
  db:
    image: postgres:16-alpine
    container_name: football-picks-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football_picks
    ports:
      - "5432:5432"
    volumes:
      - football_picks_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d football_picks"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  football_picks_pgdata:
